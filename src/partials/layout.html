<!doctype html>
<html lang="en" class="{{ htmlClass }}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#f5f5f5" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1a1a1a" media="(prefers-color-scheme: dark)" />
    <title>{{ title }}</title>
    <meta name="description" content="{{ description }}" />
    <link rel="canonical" href="{{ canonical }}" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <meta property="og:type" content="{{ ogType }}" />
    <meta property="og:title" content="{{ ogTitle }}" />
    <meta property="og:description" content="{{ description }}" />
    <meta property="og:url" content="{{ canonical }}" />
    <meta property="og:site_name" content="Alexander West" />
    <meta property="og:image" content="{{ ogImage }}" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{ ogTitle }}" />
    <meta name="twitter:description" content="{{ description }}" />
    <meta name="twitter:image" content="{{ ogImage }}" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,400..600&family=IBM+Plex+Mono:wght@400;500;600&family=Lora:ital,wght@0,400..600;1,400..500&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/styles.css" />

    <!-- Choose dark/light synchronously so we don't flash the wrong theme.
         Reads localStorage('theme') first, then system preference. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
          var mode = stored || (prefersDark ? "dark" : "light");
          if (mode === "dark") document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>

    <script type="application/ld+json">
      {{ jsonLd }}
    </script>
  </head>
  <body class="{{ bodyClass }}">
    {{ header }}
    <main>{{ content }}</main>
    {{ background }}
    <script src="/scripts/theme.js" defer></script>
    {{ pageScripts }}
  </body>
</html>
