<article class="mx-auto w-full max-w-3xl px-7 pb-24 pt-20 sm:px-8 sm:pt-24 lg:px-12">
  <header class="draft title-block border border-border">
    <div class="px-6 pb-7 pt-6 sm:px-8">
      <p class="flex items-center gap-2.5 font-mono text-[11px] font-semibold uppercase tracking-[0.26em] text-accent">
        {{ label }}
      </p>

      <h1 class="mt-4 font-display text-3xl font-bold leading-[1.05] tracking-[-0.02em] text-foreground sm:text-4xl md:text-[2.6rem]">{{ title }}</h1>

      <p class="mt-5 max-w-2xl text-base leading-relaxed text-muted-foreground sm:text-lg">{{ summary }}</p>
    </div>

    <div class="tb-grid">
      <div class="tb-cell">
        <span class="tb-label" aria-hidden="true">Author</span>
        <span>{{ author }}</span>
      </div>
      <div class="tb-cell">
        <span class="tb-label" aria-hidden="true">Role</span>
        <span>{{ authorDesc }}</span>
      </div>
      <div class="tb-cell">
        <span class="tb-label" aria-hidden="true">Date</span>
        <time datetime="{{ published }}">{{ publishedFormatted }}</time>
      </div>
      {{ readTimeBlock }}
    </div>

    {{ tagBlock }}
  </header>

  <div class="prose prose-lg mt-12 max-w-[68ch]">
    {{ content }}
  </div>

  <footer class="mt-16 border-t border-border pt-8">
    <a href="/blog" class="group inline-flex items-center gap-2.5 font-mono text-xs font-medium uppercase tracking-[0.16em] text-foreground transition-colors duration-150 hover:text-accent">
      <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="m12 19-7-7 7-7" />
        <path d="M19 12H5" />
      </svg>
      <span class="title-underline">Back to all posts</span>
    </a>
  </footer>
</article>
